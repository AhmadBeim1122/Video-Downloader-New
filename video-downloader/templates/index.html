<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.10/htmx.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen text-white">

    <div class="max-w-2xl mx-auto px-4 py-16">

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2"><a href="/" class="text-white hover:text-blue-400 transition">📥 Video Downloader</a></h1>
            <p class="text-slate-400">YouTube, Facebook, TikTok — sab ek jagah</p>
        </div>

        <!-- URL Input Form -->
        <div class="bg-slate-800/60 backdrop-blur rounded-2xl p-6 shadow-xl border border-slate-700">
            <form hx-post="/analyze"
                  hx-target="#result-area"
                  hx-swap="innerHTML"
                  hx-indicator="#analyze-spinner"
                  class="flex flex-col sm:flex-row gap-3">

                <input
                    type="text"
                    name="url"
                    placeholder="Video ka URL yahan paste karein..."
                    required
                    class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 transition px-6 py-3 rounded-lg font-semibold whitespace-nowrap"
                >
                    Analyze Karein
                </button>
            </form>

            <!-- Loading indicator jo HTMX request ke dauraan dikhta hai -->
            <div id="analyze-spinner" class="htmx-indicator flex items-center gap-2 mt-4 text-slate-400">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                </svg>
                Video information nikal rahe hain...
            </div>
        </div>

        <!-- Yahan analyze/download/progress ke partial results aayenge -->
        <div id="result-area" class="mt-6"></div>

        <p class="text-center text-slate-500 text-xs mt-10">
            Sirf personal aur fair-use ke liye istemal karein. Copyright content download karna respective platform ki Terms of Service violate kar sakta hai.
        </p>
    </div>

    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: flex; }
        .htmx-request.htmx-indicator { display: flex; }
    </style>

</body>
</html>
